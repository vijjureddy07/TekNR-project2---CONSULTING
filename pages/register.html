<!doctype html>
<!-- ============================== Register ============================== -->
<html lang="en" dir="ltr" data-theme="light">
<!-- ============================== Head ============================== -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Northline Advisory</title>
  <meta name="description" content="Create your Northline Advisory account to access bookings, courses, worksheets, dashboard tools, and future client resources.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../assets/images/branding/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<!-- ============================== Body ============================== -->
<body class="site-body page-auth-shell">
<!-- ============================== Utility Bar ============================== -->
<div class="utility-bar">
  <div class="container utility-bar__inner">
    <a class="utility-bar__brand" href="index.html">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      <span>Northline Advisory</span>
    </a>
    <div class="utility-bar__actions">
      <button class="icon-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode">
        <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
      </button>
      <button class="icon-toggle direction-toggle" type="button" data-rtl-toggle aria-label="Switch to RTL layout">LTR</button>
      <a class="button button--ghost" href="index.html">Exit</a>
    </div>
  </div>
</div>

        <!-- ============================== Main ============================== -->
<main id="main-content">
<!-- ============================== Page Content ============================== -->
<section class="section auth-section">
  <div class="container auth-grid auth-grid--modal">
    <!-- ============================== Auth Intro ============================== -->
    <div class="auth-panel auth-panel--media" data-reveal>
      <span class="eyebrow eyebrow--light">Northline Advisory</span>
      <h1>Create an account to access programs, worksheets, and your client dashboard.</h1>
      <p>Registration is used for protected resource delivery and ongoing portal access after purchase or onboarding.</p>
      <div class="media-frame media-frame--wide"><img loading="eager" fetchpriority="high" decoding="async" src="../assets/images/register/register-hero.jpg" alt="Client portal"></div>
    </div>
    <!-- ============================== Auth Form ============================== -->
    <form class="auth-panel card auth-panel--modal" data-submit-success-href="dashboard/client-dashboard.html" data-success-message="Account placeholder created. Redirecting to the client dashboard." data-validate novalidate data-reveal>
      <h2>Create account</h2>
      <div class="form-stack">
        <label>Full Name<input class="input" type="text" name="name" placeholder="Your name" required></label>
        <label>E-mail<input class="input" type="email" name="email" placeholder="you@example.com" required></label>
        <label>Password<input class="input" type="password" name="password" placeholder="Create a password" required></label>
      </div>
      <button class="button" type="submit">Create account</button>
      <p class="form-message" aria-live="polite"></p>
      <p class="auth-note"><a href="login.html">Already have an account? Log in.</a></p>
    </form>
  </div>
</section>

        </main>
        <!-- ============================== Scripts ============================== -->
<script src="../assets/js/main.js" defer></script>

      </body>
    </html>
