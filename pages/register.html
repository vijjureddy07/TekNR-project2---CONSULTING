<!doctype html>
<!-- ============================== Register ============================== -->
<html lang="en" dir="ltr" data-theme="light">
<!-- ============================== Head ============================== -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Register | Northline Advisory</title>
  <meta name="description" content="Create your Northline Advisory account to access bookings, courses, worksheets, dashboard tools, and future client resources.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" sizes="any" href="../assets/images/branding/favicon.svg?v=7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css?v=8">
  <link rel="stylesheet" href="../assets/css/dark-mode.css?v=7">
  <link rel="stylesheet" href="../assets/css/rtl.css?v=7">
</head>
<!-- ============================== Body ============================== -->
<body class="site-body page-auth-shell">
<!-- ============================== Utility Bar ============================== -->
<div class="utility-bar">
  <div class="container utility-bar__inner">
    <a class="utility-bar__brand utility-bar__brand--mark" href="index.html" aria-label="Northline Advisory home">
      <span class="utility-bar__logomark" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="36" height="36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15 35V13L33 35V13" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="33" cy="13" r="2.6" fill="currentColor"/></svg>
      </span>
      <span class="utility-bar__brand-text">Northline Advisory</span>
    </a>
    <div class="utility-bar__actions">
      <button class="icon-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode">
        <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
      </button>
    </div>
  </div>
</div>

        <!-- ============================== Main ============================== -->
<main id="main-content">
<!-- ============================== Page Content ============================== -->
<section class="section auth-section">
  <div class="container auth-grid auth-grid--modal auth-grid--single">
    <!-- ============================== Auth Form ============================== -->
    <form class="auth-panel card auth-panel--modal" data-submit-success-href="dashboard/client-dashboard.html" data-success-message="Account created. Redirecting to the client dashboard." data-validate novalidate data-reveal>
      <h2>Create account</h2>
      <div class="form-stack">
        <label>Full Name<input class="input" type="text" name="name" placeholder="Your name" required></label>
        <label>E-mail<input class="input" type="email" name="email" placeholder="you@example.com" required></label>
        <div class="password-field">
          <label>Password<input class="input" type="password" name="password" placeholder="Create a password" required autocomplete="new-password"></label>
          <button class="password-toggle" type="button" aria-label="Show password">
            <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
          </button>
        </div>
      </div>
      <button class="button" type="submit">Create account</button>
      <p class="form-message" aria-live="polite"></p>
      <div class="auth-divider"><span>or continue with</span></div>
      <div class="auth-social auth-social--triple">
        <button class="auth-social-btn" type="button" aria-label="Sign up with Google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="auth-social-btn" type="button" aria-label="Sign up with Apple">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="currentColor" aria-hidden="true"><path d="M13.12 9.558c-.02-2.117 1.735-3.14 1.815-3.19-1-1.452-2.545-1.651-3.088-1.668-1.303-.133-2.567.775-3.232.775-.673 0-1.692-.762-2.787-.74C4.307 4.757 2.87 5.659 2.085 7.065c-1.607 2.78-.41 6.884 1.14 9.14.773 1.108 1.682 2.344 2.868 2.3 1.16-.046 1.594-.739 2.994-.739 1.392 0 1.794.739 3.014.714 1.243-.022 2.025-1.12 2.77-2.238.887-1.279 1.245-2.524 1.264-2.587-.028-.012-2.421-.927-2.445-3.097zM10.98 2.91C11.6 2.151 12.024 1.1 11.902 0c-.894.037-1.985.599-2.629 1.346-.574.659-1.082 1.726-.949 2.742.999.077 2.016-.508 2.656-1.178z"/></svg>
          Apple
        </button>
        <button class="auth-social-btn" type="button" aria-label="Sign up with Microsoft">
          <svg width="18" height="18" viewBox="0 0 21 21" fill="none" aria-hidden="true"><path fill="#F25022" d="M1 1h9v9H1z"/><path fill="#7FBA00" d="M11 1h9v9h-9z"/><path fill="#00A4EF" d="M1 11h9v9H1z"/><path fill="#FFB900" d="M11 11h9v9h-9z"/></svg>
          Microsoft
        </button>
      </div>
      <p class="auth-note"><a href="login.html">Already have an account? Log in</a></p>
    </form>
  </div>
</section>

        </main>
        <!-- ============================== Scripts ============================== -->
<script src="../assets/js/main.js?v=10" defer></script>

      </body>
    </html>
