<!doctype html>
<!-- ============================== Reset Password ============================== -->
<html lang="en" dir="ltr" data-theme="light">
<!-- ============================== Head ============================== -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Northline Advisory</title>
  <meta name="description" content="Reset your Northline Advisory account password to regain access to the client dashboard, course content, worksheets, and settings.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../assets/images/branding/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<!-- ============================== Body ============================== -->
<body class="site-body page-auth-shell">
<!-- ============================== Utility Bar ============================== -->
<div class="utility-bar">
  <div class="container utility-bar__inner">
    <a class="utility-bar__brand" href="index.html">
      <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
      <span>Northline Advisory</span>
    </a>
    <div class="utility-bar__actions">
      <button class="icon-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode">
        <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
      </button>
      <button class="icon-toggle direction-toggle" type="button" data-rtl-toggle aria-label="Switch to RTL layout">LTR</button>
      <a class="button button--ghost" href="login.html">Exit</a>
    </div>
  </div>
</div>

        <!-- ============================== Main ============================== -->
<main id="main-content">
<!-- ============================== Page Content ============================== -->
<section class="section auth-section">
  <div class="container auth-grid auth-grid--modal auth-grid--single">
    <!-- ============================== Auth Panel ============================== -->
    <div class="auth-panel card auth-panel--modal" data-reveal>
      <span class="eyebrow">Reset Password</span>
      <h1>Reset your password and get back into the dashboard.</h1>
      <p>Enter the email tied to your client account and we will send reset instructions.</p>
      <!-- ============================== Auth Form ============================== -->
      <form data-success-message="Reset-link placeholder sent. Connect your auth provider to deliver real email." data-validate novalidate>
        <div class="form-stack">
          <label>E-mail<input class="input" type="email" name="email" placeholder="you@example.com" required></label>
        </div>
        <button class="button" type="submit">Send reset link</button>
        <p class="form-message" aria-live="polite"></p>
      </form>
      <p class="auth-note"><a href="login.html">Return to login.</a></p>
    </div>
  </div>
</section>

        </main>
        <!-- ============================== Scripts ============================== -->
<script src="../assets/js/main.js" defer></script>

      </body>
    </html>
